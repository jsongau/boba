<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Boba Night">
  <title>Boba Night</title>
  <defs>
    <!-- Night-sky badge: obsidian, lifted slightly at the top for depth on dark tab bars -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#191A20"/>
      <stop offset="0.55" stop-color="#101116"/>
      <stop offset="1" stop-color="#0B0C0E"/>
    </linearGradient>
    <!-- Warm glow behind the cup so the amber pops off the obsidian -->
    <radialGradient id="glow" cx="0.5" cy="0.62" r="0.55">
      <stop offset="0" stop-color="#5A3C1C" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#2A1D10" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#0B0C0E" stop-opacity="0"/>
    </radialGradient>
    <!-- Milk-tea fill -->
    <linearGradient id="tea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F3BC64"/>
      <stop offset="0.45" stop-color="#D9862C"/>
      <stop offset="1" stop-color="#A5580F"/>
    </linearGradient>
    <!-- Champagne / gilt moon -->
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7E3AA"/>
      <stop offset="1" stop-color="#C5A46D"/>
    </linearGradient>
    <!-- Straw: pearl highlight to champagne shadow -->
    <linearGradient id="straw" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FCF9F3"/>
      <stop offset="1" stop-color="#C9B487"/>
    </linearGradient>
    <!-- Crescent = lit disc minus an offset bite -->
    <mask id="moonMask">
      <circle cx="17.5" cy="17.5" r="9" fill="#fff"/>
      <circle cx="22.8" cy="15.8" r="8.4" fill="#000"/>
    </mask>
    <!-- Confine the tea, swirl and pearls to the cup interior -->
    <clipPath id="cupClip">
      <path d="M21.8 29.4 H44.2 L41.0 49.8 A2.7 2.7 0 0 1 38.4 52.2 H27.6 A2.7 2.7 0 0 1 25.0 49.8 Z"/>
    </clipPath>
  </defs>

  <!-- Badge -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="0.8" y="0.8" width="62.4" height="62.4" rx="13.3" fill="none" stroke="#F4EFE7" stroke-opacity="0.10" stroke-width="1.1"/>
  <ellipse cx="32" cy="40" rx="21" ry="23" fill="url(#glow)"/>

  <!-- Moon (behind the cup) -->
  <circle cx="17.5" cy="17.5" r="9" fill="url(#moon)" mask="url(#moonMask)"/>

  <!-- Sparkles -->
  <path d="M30.6 5.0 C31.1 8.2 32.2 9.3 35.4 9.8 C32.2 10.3 31.1 11.4 30.6 14.6 C30.1 11.4 29.0 10.3 25.8 9.8 C29.0 9.3 30.1 8.2 30.6 5.0 Z" fill="#FCF9F3"/>
  <circle cx="11.5" cy="31.5" r="1.1" fill="#FCF9F3" opacity="0.85"/>
  <circle cx="47.5" cy="21" r="0.9" fill="#F4DDA2" opacity="0.8"/>

  <!-- Flamingo ripple at the base (behind the cup) -->
  <path d="M19.5 54 Q32 58.4 44.5 54" fill="none" stroke="#ff2f6d" stroke-width="1.5" stroke-linecap="round" opacity="0.92"/>
  <path d="M24 56.2 Q32 59 40 56.2" fill="none" stroke="#ff2f6d" stroke-width="1.1" stroke-linecap="round" opacity="0.5"/>

  <!-- Cup -->
  <g>
    <!-- Clear glass body -->
    <path d="M21.8 29.4 H44.2 L41.0 49.8 A2.7 2.7 0 0 1 38.4 52.2 H27.6 A2.7 2.7 0 0 1 25.0 49.8 Z" fill="#F4EFE7" fill-opacity="0.06"/>
    <!-- Tea + contents, clipped to the glass -->
    <g clip-path="url(#cupClip)">
      <rect x="20" y="33" width="26" height="21" fill="url(#tea)"/>
      <!-- Milk / foam surface -->
      <rect x="20" y="32.6" width="26" height="2.6" fill="#F7E2B4" opacity="0.9"/>
      <!-- Ice hint -->
      <path d="M27.2 35 h4 l-1.4 4 h-4 Z" fill="#FCF9F3" opacity="0.16"/>
      <path d="M33.5 35.4 h3.2 l-1.1 3.2 h-3.2 Z" fill="#FCF9F3" opacity="0.12"/>
      <!-- Milk swirl -->
      <path d="M25.8 42 C29 38.4 35 44 39.4 40.2" fill="none" stroke="#FBEFCE" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
      <!-- Tapioca pearls -->
      <g>
        <circle cx="28.4" cy="47.8" r="2.6" fill="#17100A"/>
        <circle cx="33.6" cy="48.2" r="2.7" fill="#17100A"/>
        <circle cx="31.0" cy="44.4" r="2.5" fill="#17100A"/>
        <circle cx="36.2" cy="45.8" r="2.4" fill="#17100A"/>
        <circle cx="27.7" cy="47.1" r="0.7" fill="#C89B6A" opacity="0.85"/>
        <circle cx="32.9" cy="47.5" r="0.7" fill="#C89B6A" opacity="0.85"/>
        <circle cx="30.4" cy="43.7" r="0.6" fill="#C89B6A" opacity="0.8"/>
      </g>
    </g>
    <!-- Glass outline lifts the silhouette off the obsidian -->
    <path d="M21.8 29.4 H44.2 L41.0 49.8 A2.7 2.7 0 0 1 38.4 52.2 H27.6 A2.7 2.7 0 0 1 25.0 49.8 Z" fill="none" stroke="#F4EFE7" stroke-width="1.15" stroke-linejoin="round" opacity="0.92"/>

    <!-- Straw (through the lid) -->
    <g transform="rotate(17 33 28)">
      <rect x="31" y="5.5" width="4" height="23.5" rx="2" fill="url(#straw)"/>
      <rect x="31.4" y="6" width="1.3" height="22" rx="0.65" fill="#FCF9F3" opacity="0.6"/>
    </g>

    <!-- Lid -->
    <path d="M23 24.8 Q23 20.9 32 20.9 Q41 20.9 41 24.8 Z" fill="#FCF9F3"/>
    <rect x="19.4" y="24.4" width="25.2" height="4.8" rx="2.4" fill="#F4EFE7"/>
    <rect x="19.4" y="27.7" width="25.2" height="1.5" rx="0.75" fill="#0B0C0E" opacity="0.12"/>
  </g>
</svg>
